<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Patients - CardioAI</title>
        <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        /* ==================== CSS VARIABLES ==================== */
        :root {
            --primary-blue: #003785;
            --primary-green: #87af12;
            --light-green: #779f00;
            --danger-red: #de3b40;
            --warning-orange: #f59e0b;
            --teal: #1c8a8e;
            --white: #ffffff;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-500: #6b7280;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --bg-light: #e8f0f8;
            --bg-sidebar: rgba(178, 215, 66, 0.56);
            --shadow-sm: 0px 1px 3px rgba(0, 0, 0, 0.1);
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        /* ==================== RESET & LAYOUT ==================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--white);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ==================== SIDEBAR ==================== */
        .sidebar {
            width: 270px;
            background: var(--bg-sidebar);
            height: 100%;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            overflow-y: auto;
            border-right: 1px solid rgba(0, 0, 0, 0.05);
            z-index: 20;
        }

        .sidebar-logo {
            margin-bottom: 40px;
            padding-left: 10px;
            cursor: pointer;
        }

        .nav-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            color: var(--gray-700);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateX(4px);
        }

        .nav-item.active {
            background: rgba(0, 55, 133, 0.1);
            color: var(--primary-blue);
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }

        .ai-promo {
            margin-top: auto;
            background: var(--white);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px dashed #ccc;
            cursor: pointer;
        }

        /* ==================== MAIN CONTENT ==================== */
        .main-content {
            flex-grow: 1;
            height: 100vh;
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 32px;
            background-color: var(--bg-light);
            z-index: 10;
        }

        .header-text h1 {
            color: var(--primary-blue);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header-text p {
            color: var(--gray-500);
            font-size: 16px;
        }

        .header-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .btn-primary {
            background: var(--primary-blue);
            color: white;
            padding: 10px 20px;
            border-radius: var(--radius-md);
            border: none;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.3s;
        }

        .btn-primary:hover {
            background: #002a66;
        }

        /* Scrollable Area */
        .scrollable-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 0 32px 24px 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ==================== STATS CARDS ==================== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        @media(max-width: 1000px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .stat-card {
            background: var(--white);
            padding: 20px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .stat-icon-box {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0fdf4;
        }

        .stat-info h3 {
            font-size: 24px;
            font-weight: 700;
            color: var(--gray-800);
            margin: 0;
        }

        .stat-info p {
            font-size: 13px;
            color: var(--gray-500);
            margin: 0;
        }

        /* ==================== PATIENT CARDS GRID ==================== */
        .patients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .patient-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid transparent;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
        }

        .patient-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: var(--primary-blue);
        }

        /* Card Header */
        .card-header {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--gray-100);
        }

        .patient-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gray-100);
        }

        .patient-main-info h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 4px;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.active {
            background: #dcfce7;
            color: #166534;
        }

        .status-badge.critical {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-badge.inactive {
            background: #f3f4f6;
            color: #374151;
        }

        /* Card Body */
        .card-body {
            padding: 20px;
            flex-grow: 1;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 14px;
            color: var(--gray-700);
        }

        .info-icon {
            width: 16px;
            height: 16px;
            opacity: 0.6;
            object-fit: contain;
        }

        .medical-tag {
            background: #fff7ed;
            color: #c2410c;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            margin-top: 10px;
            display: inline-block;
        }

        .medical-tag.critical {
            background: #fee2e2;
            color: #991b1b;
        }

        /* Card Footer */
        .card-footer {
            padding: 16px 20px;
            background: var(--gray-50);
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--gray-100);
        }

        .btn-card {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
        }

        .btn-view {
            background: white;
            border: 1px solid var(--gray-300);
            color: var(--gray-700);
        }

        .btn-view:hover {
            border-color: var(--primary-blue);
            color: var(--primary-blue);
        }

        .btn-records {
            background: var(--primary-blue);
            color: white;
            border: none;
        }

        .btn-records:hover {
            background: #002a66;
        }

        /* Footer */
        footer {
            flex-shrink: 0;
            padding: 16px 32px;
            background-color: var(--bg-light);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .floating-chat {
            position: fixed;
            bottom: 80px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: #0a66f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(10, 102, 240, 0.4);
            cursor: pointer;
            z-index: 90;
            transition: transform 0.3s;
            border: none;
        }

        .floating-chat:hover {
            transform: scale(1.1);
        }

        /* Edits */
        /* Chat Bot Icon */
        .chat-bot-icon {
            position: fixed;
            bottom: 80px;
            right: 32px;
            width: 60px;
            height: 60px;
            background: #003785;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0px 4px 12px rgba(0, 55, 133, 0.3);
            transition: all 0.3s;
            z-index: 999;
            overflow: hidden;
            padding: 8px;
        }

        .chat-bot-icon:hover {
            background: #6b9137;
            transform: scale(1.1);
            box-shadow: 0px 6px 16px rgba(0, 0, 0, 0.2);
        }

        #chatBotImage {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
        }

        /* Edit sidebar */
.dashboard-layout {
    display: flex;

/* Sidebar */
.sidebar {
    background: rgba(170, 213, 42, 0.56);
    border-right: 1px solid var(--medium-gray);
    padding: 20px 0;
}

.sidebar-menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.sidebar-item {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 12px 24px;
    color: var(--text-dark);
    text-decoration: none;
    transition: all 0.3s;
    border-left: 3px solid transparent;
}

.sidebar-item:hover {
    background: rgba(0, 59, 133, 0.1);
    color: var(--primary-blue);
}

.sidebar-item.active {
    background: rgba(45, 104, 175, 0.1);
    color: var(--primary-blue);
    border-left-color: var(--primary-blue);
}

.sidebar-item i {
    width: 20px;
    text-align: center;
    font-size: 16px;
}

.sidebar-item span {
    font-size: 14px;
    font-weight: 500;
}
@media (max-width: 768px) {
    .dashboard-layout {
        flex-direction: column;
    }
    
    .sidebar {
        width: 100%;
        height: auto;
        position: static;
        margin-top: 0;
    }
}


    </style>

    <main class="main-content" style="width: calc(100vw - 270px);">

        <header>
            <div class="header-text">
                <h1>My Patients</h1>
                <p>Manage your assigned patient roster</p>
            </div>
            <div class="header-actions">
                <button class="btn-primary"
                    onclick="window.location.href='../patient-search/patient-search/patient-search.html'">
                    <img src="Search.png" style="width:16px; filter: brightness(0) invert(1);"
                        onerror="this.style.display='none'">
                    Find Patient
                </button>
                <div style="display:flex; align-items:center; gap:10px;">
                    <span id="doctorNamePill" style="font-weight:600; color:var(--primary-blue);">Doctor</span>
                    <img id="doctorAvatarPill" src="" style="width:40px; height:40px; border-radius:50%; object-fit:cover;"
                        onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'">
                </div>
            </div>
        </header>

        <div class="scrollable-content">

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon-box"><img src="calendar-days.png" width="24"
                            onerror="this.src='https://cdn-icons-png.flaticon.com/512/2693/2693507.png'"></div>
                    <div class="stat-info">
                        <h3 id="statTotalPatients">-</h3>
                        <p>Total Patients</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon-box" style="background:#eff6ff;"><img src="Active Patients.png" width="24"
                            onerror="this.src='https://cdn-icons-png.flaticon.com/512/1256/1256650.png'"></div>
                    <div class="stat-info">
                        <h3 id="statActivePatients">-</h3>
                        <p>Active Patients</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon-box" style="background:#fef2f2;"><img src="Critical Cases.png" width="24"
                            onerror="this.src='https://cdn-icons-png.flaticon.com/512/1150/1150612.png'"></div>
                    <div class="stat-info">
                        <h3 id="statCriticalCases">-</h3>
                        <p>Critical Cases</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon-box" style="background:#fffbeb;"><img src="calendar-days.png" width="24"
                            onerror="this.src='https://cdn-icons-png.flaticon.com/512/2693/2693507.png'"></div>
                    <div class="stat-info">
                        <h3 id="statAppointments">-</h3>
                        <p>Appointments</p>
                    </div>
                </div>
            </div>

            <div class="patients-grid" id="patientsGrid">
                <!-- Patient cards rendered by script.js from API -->
            </div>
        </div>
        <footer>
