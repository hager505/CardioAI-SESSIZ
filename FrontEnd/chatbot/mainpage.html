<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardioAI Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link rel="icon" href="chatbot.png" type="image/png">
</head>
<body>
    <div class="chatbot-main-page">
        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar (Active by default on desktop) -->
        <div class="sidebar" id="sidebar" aria-hidden="true">
            <!-- Header -->
            <div class="header-section">
                <div class="logo-container" id="logoContainer" title="Go to Homepage" role="button" tabindex="0">
                    <img src="chatbot.png" alt="CardioAI Logo" class="logo-img" id="logoImage">
                    <div class="logo-text">
                        <span class="blue">Cardio</span>
                        <span class="green">AI</span>
                    </div>
                </div>
                <div class="header-section-right">
                    <!-- Clean controller: X button removed, only back-button left -->
                    <div class="back-button" id="backButton" title="Collapse Sidebar">
                        <i class="fas fa-arrow-left"></i>
                    </div>
                </div>
            </div>

            <!-- Control Panel -->
            <div class="control-panel">
                <div class="menu-button" id="menuButton" role="button" tabindex="0">
                    <i class="fas fa-bars"></i>
                    <span data-i18n="menu">Menu</span>
                </div>
                <div class="new-chat-button" id="newChatButton">
                    <i class="fas fa-plus-circle"></i>
                    <span data-i18n="newChat">New Chat</span>
                </div>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search" id="searchInput" data-i18n-placeholder="search">
                </div>
            </div>

            <!-- Menu Dropdown -->
            <div class="menu-dropdown" id="menuDropdown">
                <div class="menu-dropdown-header">
                    <span data-i18n="menu">Menu</span>
                    <div class="menu-close" id="menuClose">
                        <i class="fas fa-times"></i>
                    </div>
                </div>
                <div class="menu-item" id="menuSettings">
                    <i class="fas fa-cog"></i>
                    <span data-i18n="settings">Settings</span>
                </div>
                <div class="menu-item" id="menuHelp">
                    <i class="fas fa-question-circle"></i>
                    <span data-i18n="help">Help</span>
                </div>
                <div class="menu-item" id="menuAbout">
                    <i class="fas fa-info-circle"></i>
                    <span data-i18n="about">About</span>
                </div>
                <div class="menu-divider"></div>
                <div class="menu-item" id="menuLogout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span data-i18n="logout">Logout</span>
                </div>
            </div>

            <!-- Chats List -->
            <div class="chats-section">
                <div class="section-title" data-i18n="chats">Chats</div>
                <div class="chats-list" id="chatsList">
                    <!-- Chats will be loaded here -->
                </div>
            </div>

            <!-- User Section -->
            <div class="user-section">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">
                        <div class="avatar-placeholder" id="avatarPlaceholder">U</div>
                    </div>
                    <div class="user-details">
                        <div class="username" id="username">User</div>
                        <div class="user-status" id="userStatus" data-i18n="online">Online</div>
                    </div>
                </div>
                <div class="settings-button" id="settingsButton" title="Settings">
                    <i class="fas fa-ellipsis-v"></i>
                </div>
            </div>
        </div>

        <!-- Divider (Hidden to prevent shifting line glitches) -->
        <div class="divider"></div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Header -->
            <div class="content-header">
                <div class="hamburger-menu" id="hamburgerMenu" aria-label="Open menu" role="button" tabindex="0">
                    <i class="fas fa-bars"></i>
                </div>
                <div class="page-title" id="pageTitleMain" role="button" tabindex="0" title="Go to Homepage">
                    <span class="blue">Cardio</span>
                    <span class="green">AI</span>
                    <span class="title-sub" data-i18n="aiAssistant">AI Assistant</span>
                </div>
                <div class="header-controls">
                    <div class="model-selector" id="modelSelector">
                        <button class="model-selector-button" id="modelSelectorButton" type="button" aria-haspopup="true" aria-expanded="false">
                            <i class="fas fa-brain"></i>
                            <span id="selectedModelName" data-i18n="generalModel">General Model</span>
                            <i class="fas fa-chevron-down"></i>
                        </button>
                        <div class="model-selector-menu" id="modelSelectorMenu" role="menu">
                            <button class="model-option active" type="button" data-model="general-model" role="menuitem" onclick="selectModel('general-model')">
                                <i class="fas fa-globe"></i> <span data-i18n="generalModel">General Model</span>
                            </button>
                            <div class="model-divider"></div>
                            <button class="model-option" type="button" data-model="cardioai-vitals" role="menuitem" onclick="selectModel('cardioai-vitals')">🫀 <span data-i18n="cardioaiVitals">CardioAI Vitals</span></button>
                            <button class="model-option" type="button" data-model="cardioai-ecg" role="menuitem" onclick="selectModel('cardioai-ecg')">📊 <span data-i18n="cardioaiECG">CardioAI ECG</span></button>
                        </div>
                    </div>
                    <div class="exit-button" id="exitButton" title="Exit Chat">
                        <span data-i18n="back">Back</span>
                        <i class="fas fa-arrow-left"></i>
                    </div>
                </div>
            </div>

            <!-- Chat Area -->
            <div class="chat-area" id="chatArea">
                <!-- Welcome Message -->
                <div class="welcome-message" id="welcomeMessage">
                    <div class="welcome-logo">
                        <img src="chatbot.png" alt="CardioAI Logo">
                    </div>
                    <div class="welcome-text" id="welcomeText" data-i18n="welcome">What can I help you today?</div>
                    <div class="welcome-suggestions">
                        <button class="suggestion-btn" data-text="What are heart disease symptoms?" data-i18n="heartDiseaseSymptoms">
                            <i class="fas fa-heartbeat text-red"></i>
                            <span data-i18n="heartDiseaseSymptoms">Heart disease symptoms</span>
                        </button>
                        <button class="suggestion-btn" data-text="How to maintain heart health?" data-i18n="heartHealthTips">
                            <i class="fas fa-heart text-pink"></i>
                            <span data-i18n="heartHealthTips">Heart health tips</span>
                        </button>
                        <button class="suggestion-btn" data-text="What tests do I need?" data-i18n="medicalTests">
                            <i class="fas fa-stethoscope text-blue"></i>
                            <span data-i18n="medicalTests">Medical tests</span>
                        </button>
                        <button class="suggestion-btn vitals-check-btn" id="quickVitalsCheck" data-i18n="vitalsCheck">
                            <i class="fas fa-chart-line text-green"></i>
                            <span data-i18n="vitalsCheck">Vitals Check</span>
                        </button>
                        <button class="suggestion-btn ecg-upload-btn" id="quickECGAnalysis" data-i18n="ecgAnalysis">
                            <i class="fas fa-heart-pulse text-indigo"></i>
                            <span data-i18n="ecgAnalysis">ECG Analysis</span>
                        </button>
                    </div>
                </div>

                <!-- Messages Container -->
                <div class="messages-container" id="messagesContainer"></div>
            </div>

            <!-- Message Input Container -->
            <div class="message-input-wrapper-outer">
                <div class="message-input-container">
                    <input type="text" placeholder="What can I help you today?" id="messageInput" data-i18n-placeholder="messagePlaceholder">
                    <div class="input-controls">
                        <div class="stop-button" id="stopButton" title="Stop Generating" style="display: none;">
                            <i class="fas fa-stop"></i>
                        </div>
                        <div class="send-button" id="sendButton" title="Send Message">
                            <i class="fas fa-arrow-up"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Floating New Chat Button -->
            <div class="new-chat-fab pulse" id="newChatFab" title="New Chat">
                <i class="fas fa-plus"></i>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="settings-modal" id="settingsModal">
        <div class="settings-content">
            <div class="settings-header">
                <div class="settings-title" id="settingsTitle" data-i18n="settings">Settings</div>
                <div class="close-settings" id="closeSettings">&times;</div>
            </div>
            <div class="settings-body">
                <div class="setting-option">
                    <div class="setting-label">
                        <i class="fas fa-moon"></i>
                        <span id="darkModeLabel" data-i18n="darkMode">Dark Mode</span>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="darkModeToggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-option">
                    <div class="setting-label">
                        <i class="fas fa-language"></i>
                        <span id="languageLabel" data-i18n="language">Language</span>
                    </div>
                    <select class="language-select" id="languageSelect">
                        <option value="en">English</option>
                        <option value="ar">العربية</option>
                    </select>
                </div>
                <div class="setting-option">
                    <div class="setting-label">
                        <i class="fas fa-volume-up"></i>
                        <span data-i18n="notificationSound">Notification Sound</span>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="soundToggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-option">
                    <div class="setting-label">
                        <i class="fas fa-bell"></i>
                        <span data-i18n="desktopNotifications">Desktop Notifications</span>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="notificationsToggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- Profile Settings Modal -->
    <div class="profile-settings-modal" id="profileSettingsModal">
        <div class="profile-settings-content">
            <div class="profile-settings-header">
                <div class="profile-settings-title" id="profileSettingsTitle" data-i18n="profileSettings">Profile Settings</div>
                <div class="close-profile-settings" id="closeProfileSettings">&times;</div>
            </div>
            <div class="profile-settings-body">
                <!-- Theme Toggle -->
                <div class="profile-setting-option">
                    <div class="profile-setting-label">
                        <i class="fas fa-moon"></i>
                        <span id="profileDarkModeLabel" data-i18n="darkMode">Dark Mode</span>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="profileDarkModeToggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                
                <!-- Language Selection -->
                <div class="profile-setting-option">
                    <div class="profile-setting-label">
                        <i class="fas fa-language"></i>
                        <span id="profileLanguageLabel" data-i18n="language">Language</span>
                    </div>
                    <div class="profile-language-options">
                        <button class="lang-btn active" data-lang="en">English</button>
                        <button class="lang-btn" data-lang="ar">العربية</button>
                    </div>
                </div>
                
                <!-- Apply/Cancel Buttons -->
                <div class="profile-settings-actions">
                    <button class="profile-settings-cancel" id="profileSettingsCancel" data-i18n="cancel">Cancel</button>
                    <button class="profile-settings-save" id="profileSettingsSave" data-i18n="save">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Vitals Input Modal -->
    <div class="vitals-modal" id="vitalsModal">
        <div class="vitals-content">
            <div class="vitals-header">
                <div class="vitals-title" data-i18n="vitalsCheck">Vitals Check</div>
                <div class="close-vitals" id="closeVitals">&times;</div>
            </div>
            <div class="vitals-body">
                <div class="vitals-source">
                    <div class="vitals-source-field" id="vitalsSourceSelectWrap">
                        <label for="vitalsPatientSelect" data-i18n="selectPatient">Select Patient</label>
                        <select id="vitalsPatientSelect" class="vitals-select">
                            <option value="" data-i18n="loadingPatients">Loading patients…</option>
                        </select>
                    </div>
                    <div class="vitals-source-actions">
                        <button class="vitals-load-btn" id="vitalsLoadBtn" type="button">
                            <i class="fas fa-cloud-download-alt"></i>
                            <span data-i18n="loadLatestVitals">Load Latest Vitals</span>
                        </button>
                    </div>
                    <div class="vitals-notice" id="vitalsNotice" hidden></div>
                </div>
                <div class="vitals-grid">
                    <div class="vitals-field">
                        <label data-i18n="systolicBP">Systolic BP (mmHg)</label>
                        <input type="number" id="vitals-bpsys" placeholder="120" step="0.1">
                    </div>
                    <div class="vitals-field">
                        <label data-i18n="diastolicBP">Diastolic BP (mmHg)</label>
                        <input type="number" id="vitals-bpdia" placeholder="80" step="0.1">
                    </div>
                    <div class="vitals-field">
                        <label data-i18n="heartRate">Heart Rate (bpm)</label>
                        <input type="number" id="vitals-hr" placeholder="72" step="0.1">
                    </div>
                    <div class="vitals-field">
                        <label data-i18n="temperature">Temperature (°C)</label>
                        <input type="number" id="vitals-temp" placeholder="36.6" step="0.1">
                    </div>
                    <div class="vitals-field">
                        <label data-i18n="respiratoryRate">Respiratory Rate (/min)</label>
                        <input type="number" id="vitals-rr" placeholder="16" step="0.1">
                    </div>
                    <div class="vitals-field">
                        <label data-i18n="oxygenSaturation">Oxygen Saturation (%)</label>
                        <input type="number" id="vitals-spo2" placeholder="98" step="0.1">
                    </div>
                    <div class="vitals-field">
                        <label data-i18n="bmi">BMI</label>
                        <input type="number" id="vitals-bmi" placeholder="24.5" step="0.1">
                    </div>
                </div>
            </div>
            <div class="vitals-actions">
                <button class="vitals-cancel-btn" id="vitalsCancel" data-i18n="cancel">Cancel</button>
                <button class="vitals-analyze-btn" id="vitalsAnalyze" data-i18n="analyze">Analyze Vitals</button>
            </div>
        </div>
    </div>

    <!-- Hidden file inputs -->
    <input type="file" id="hiddenImageInput" style="display: none;" accept="image/*">
    <input type="file" id="hiddenFileInput" style="display: none;" accept="*/*">
    <input type="file" id="hiddenAudioInput" style="display: none;" accept="audio/*">
    <input type="file" id="hiddenVideoInput" style="display: none;" accept="video/*">

    <!-- Audio element for playback -->
    <audio id="audioPlayer" style="display: none;"></audio>

    <!-- Notification sound -->
    <audio id="notificationSound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="chat.js?v=5"></script>
</body>
</html>
